<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chamber Directory | WDD231</title>

    <meta name="author" content="Michael Thomas">
    <meta name="description" content="Chamber of commerce directory page for the wdd231 web development class.">

    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/small.css">
    <link rel="stylesheet" href="styles/large.css">

    <meta property="og:title" content="Chamber of Commerce Page">
    <meta property="og:description" content="Michael Thomas's chamber of commerce page for the wdd231 web development class.">
    <meta property="og:url" content="https://mt-creations.github.io/wdd231/directory.html">
    <meta property="og:image" content="image/image.webp">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;700&display=swap" rel="stylesheet">

    <script src="scripts/footer.js" defer></script>
    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/directory.js" defer></script>
</head>

<body>
    <header>
        <img src="images/logo.svg" alt="site logo" height="1" width="1">
        <span class="title">Yorba Linda Chamber of Commerce</span>
        <button id="ham-btn" class="hamburger" aria-label="navigation menu button"></button>

        <nav id="nav-bar" class="navigation">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Discover</a></li>
                <li class="current"><a href="#">Business Directory</a></li>
                <li><a href="#">Join</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <img class="hero-img" src="images/hero-small.webp" alt="picture of the city of Yorba Linda, CA hills" loading="eager">
        <h1>Directory</h1>

        <div class="view-buttons">
            <button id="grid" class="grid-btn"><img src="images/grid-3x3.svg" alt="grid button" title="Grid View"></button>
            <button id="list" class="list-btn"><img src="images/list-task-cropped.svg" alt="list button" title="List View"></button>
        </div>

        <div id="cards" class="cards"></div>

    </main>

    <footer>
        <div class="chamber-info">
            <p>Yorba Linda Chamber of Commerce</p>
            <p>4801 Park Ave., Yorba Linda, CA 92886</p>
            <p>714-993-9537​</p>
            <p>info@yorbalindachamber.com</p>
        </div>

        <div class="social">
            <a href="https://www.facebook.com/" target="_blank"><img src="images/facebook-icon.svg" alt="facebook" width="16" height="16" title="Facebook"></a>
            <a href="https://github.com/mt-creations/wdd231" target="_blank"><img src="images/github-icon.svg" alt="github" width="16" height="16" title="Github"></a>
            <a href="https://www.linkedin.com/feed/" target="_blank"><img src="images/linkedin-icon.svg" alt="linkedin" width="16" height="16" title="LinkedIn"></a>
            <a href="https://www.instagram.com/" target="_blank"><img src="images/instagram-icon.svg" alt="instagram" width="16" height="16" title="Instagram"></a>
        </div>
        <div class="student-info">
            <p><span id="currentYear"></span></p>
            <p id="lastModified"></p>
        </div>        
    </footer>
</body>
</html>
