<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD231 | Chamber of Commerce Join Page</title>
    <meta name="author" content="Michael Thomas">
    <meta name="description" content="Join page for the Chamber of commerce site for wdd231 web development class.">

    <link rel="icon" href="images/favicon.ico">
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/larger.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;700&display=swap" rel="stylesheet">

    <meta property="og:title" content="Chamber of Commerce Page">
    <meta property="og:description" content="Michael Thomas's chamber of commerce directory page for the wdd231 web development class.">
    <meta property="og:url" content="https://mt-creations.github.io/wdd231/chamber/directory.html">
    <meta property="og:image" content="https://mt-creations.github.io/wdd231/chamber/images/hero-small.webp">

    <script src="scripts/footer.js" defer></script>
    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/join.js" defer></script>
</head>

<body>
    <header>
        <img src="images/logo.svg" alt="site logo">
        <span>Yorba Linda Chamber of Commerce</span>
        <button id="ham-btn" class="hamburger" aria-label="navigation menu button"></button>
        <nav id="nav-bar" class="navigation">
            <ul>
                <li><a href="https://mt-creations.github.io/wdd231/chamber/index.html">Home</a></li>
                <li><a href="#">Discover</a></li>
                <li><a href="https://mt-creations.github.io/wdd231/chamber/directory.html">Directory</a></li>
                <li class="current"><a href="https://mt-creations.github.io/wdd231/chamber/join.html">Join</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Join Us!</h1>

        <section>
            <div>
                <form class="form" method="get" action="thankyou.html">
                    
                    <h2 class="join-h2">Membership Application Form</h2>

                    <label>First Name: 
                        <input type="text"
                        name="first-name"
                        title="Enter Your First Name"
                        autocomplete="given-name"
                        required>
                    </label>

                    <label>
                        Last Name:
                        <input type="text"
                        name="last-name"
                        title="Enter Your Last Name"
                        autocomplete="family-name"
                        required>
                    </label>

                    <label>
                        Organization Title:
                        <input type="text"
                        name="organization-title"
                        title="Enter Your Organization Title"
                        autocomplete="organization-title"
                        pattern="[A-Za-z\\- ]{7,}">
                    </label>

                    <label>
                        Email Address:
                        <input type="email"
                        name="email"
                        title="Enter Your Email Address"
                        autocomplete="email"
                        placeholder="youremail@byu.org"
                        required>
                    </label>

                    <label>
                        Phone Number:
                        <input type="phone"
                        name="phone"
                        title="Enter Your Phone Number"
                        autocomplete="tel"
                        required>
                    </label>

                    <label>
                        Business/Organization Name:
                        <input type="text"
                         name="organization"
                         title="Enter Your Business or Organization Name"
                         autocomplete="organization"
                         required>
                    </label>

                    <label>
                        Membership Level:
                        <select name="membership-level" title="Select A Membership Level" required>
                            <option value="" selected disabled>Select</option>
                            <option value="np">NP Membership</option>
                            <option value="bronze">Bronze Membership</option>
                            <option value="silver">Silver Membership</option>
                            <option value="gold">Gold Membership</option>
                        </select>
                    </label>

                    <label>
                        Business/Organization Description:
                        <textarea
                            name="organization-description" 
                            title="Enter a description of your organization">
                        </textarea>
                    </label>

                    <label> 
                        <input type="hidden"
                        name="timestamp"
                        id="timestamp">
                    </label>

                    <input class="submit" type="submit" value="Submit Application">

                </form>
            </div>

            <div class="member-level" id="member-level">
                <h2 class="join-h2">Membership Levels</h2>
            </div>

        </section>

    </main>

    <footer>
        <div class="chamber-info">
            <p>Yorba Linda Chamber of Commerce</p>
            <p>4801 Park Ave., Yorba Linda, CA 92886</p>
            <p>714-993-9537​</p>
            <p>info@yorbalindachamber.com</p>
        </div>

        <div class="social">
            <a href="https://www.facebook.com/" target="_blank"><img src="images/facebook-icon.svg" alt="facebook" width="16" height="16"></a>
            <a href="https://github.com/mt-creations/wdd231" target="_blank"><img src="images/github-icon.svg" alt="github" width="16" height="16"></a>
            <a href="https://www.linkedin.com/feed/" target="_blank"><img src="images/linkedin-icon.svg" alt="linkedin" width="16" height="16"></a>
            <a href="https://www.instagram.com/" target="_blank"><img src="images/instagram-icon.svg" alt="instagram" width="16" height="16"></a>
        </div>

        <div class="student-info">
            <p><span id="currentYear"></span></p>
            <p id="lastModified"></p>
        </div> 
    </footer>
    
</body>
</html>
