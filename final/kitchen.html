<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen - Final Project Food Allergy Website | WDD 231</title>
    <meta name="author" content="Michael Thomas">
    <meta name="description" content="Final project for wdd231 web development class.  Kitchen page for a website about food allergies.">

    <link rel="icon" href="images/final-favicon.ico">
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/medium.css">
    <link rel="stylesheet" href="styles/larger.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;700&display=swap" rel="stylesheet">

    <meta property="og:title" content="Food allergy information website">
    <meta property="og:description" content="Michael Thomas's final project for the wdd231 web development class. A food allergy information website.">
    <meta property="og:url" content="https://mt-creations.github.io/wdd231/final/kitchen.html">
    <meta property="og:image" content="https://mt-creations.github.io/wdd231/final/kitchen.html">

    <script src="scripts/footer.js" defer></script>
    <script src="scripts/navigation.js" defer></script>
    <script type="module" src="scripts/home.js" defer></script>
</head>

<body>
    <header>
        <img src="images/hands-icon.svg" alt="holding hands icon">

        <p class="words"><span>Allergies <span class="small-word">for</span> Everyone</span></p>

        <button class="hamburger" id="ham-btn"  aria-label="navigation menu"></button>

        <nav class="navigation" id="nav-bar">
            <ul>
                <li><a class="active" href="https://mt-creations.github.io/wdd231/final/index.html">Home</a></li>
                <li class="current"><a href="https://mt-creations.github.io/wdd231/final/kitchen.html">Kitchen</a></li>
                <li><a href="#">Support</a></li>
            </ul>
        </nav>

    </header>

    <main>
        <h1>Kitchen</h1>
        <section class="intro-border">
            <div class="intro">
                <h2>Welcome to our kitchen.</h2>
                <p>Click on an allergen to see see recipes that use substitutes so you can avoid your problem food</p>
                <div class="k-index">
                    <button class="kitchen-btn" id="k-peanuts">
                        <img src="images/peanuts-icon.webp" alt="peanuts" loading="lazy">
                        <p>Peanuts</p>
                    </button>
                    <button class="kitchen-btn" id="k-treenuts">
                        <img src="images/treenuts-icon.webp" alt="tree nuts" loading="lazy">
                        <p>Tree Nuts</p>
                    </button>
                    <button class="kitchen-btn" id="k-milk">
                        <img src="images/milk-icon.webp" alt="milk" loading="lazy">
                        <p>Milk</p>
                    </button>
                    <button class="kitchen-btn" id="k-eggs">
                        <img src="images/eggs-icon.webp" alt="eggs" loading="lazy">
                        <p>Eggs</p>
                    </button>
                    <button class="kitchen-btn" id="k-wheat">
                        <img src="images/wheat-icon.webp" alt="wheat" loading="lazy">
                        <p>Wheat</p>
                    </button>
                    <button class="kitchen-btn" id="k-soy">
                        <img src="images/soy-icon.webp" alt="soy" loading="lazy">
                        <p>Soy</p>
                    </button>
                </div>
            </div>
        </section>

        <section class="intro-border">
            <div>
                
            </div>
        </section>




    </main>

</body>
</html>
